<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Social links profile</title>


  <style>
    @font-face {
      font-family: inter;
      src: url(assets/fonts/Inter-VariableFont_slnt\,wght.ttf);
    }

    body {
      background-color: hsl(0, 0%, 8%);
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: inter, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-weight: 500;
    }

    p {
      margin: 0;
    }

    footer {
      margin-top: auto;
    }

    .card {
      background-color: hsl(0, 0%, 12%);
      width: 100%;
      max-width: 900px;
      margin-top: 300px;
      border-radius: 20px;
      box-shadow: 0px 0px 20px 5px hsla(0, 0%, 0%, 0.374);
    }

    .pfp {
      border-radius: 50%;
      margin-top: 90px;
    }

    .username {
      color: white;
      font-size: 5em;
      margin-top: 50px;

    }

    .location {
      color: hsl(75, 94%, 57%);
      font-size: 2.7em;
      margin-top: 15px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 5%;
      padding-right: 5%;
      margin-bottom: 80px;
      margin-top: 30px;
    }

    .about {
      color: white;
      font-size: 2.3em;
      font-weight: 300;
      margin-top: 70px;
    }

    button {
      color: white;
      background-color: hsl(0, 0%, 20%);
      border: none;
      border-radius: 15px;
      font-size: 2em;
      margin-top: 30px;
      padding: 35px 0px;
    }



    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="assets/images/avatar-jessica.jpeg" alt="" class="pfp">

    <p class="username">Jessica Randall</p>
    <p class="location">London, United Kingdom</p>
    <p class="about">"Front-end developer and avid reader."
    </p>

    <div class="buttons">
      <button class="github">GitHub</button>
      <button class="frontend-mentor">Frontend Mentor</button>
      <button class="linkedin">LinkedIn</button>
      <button class="twitter">Twitter</button>
      <button class="instagram">Instagram</button>

    </div>

  </div>









  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Bethel</a>
  </footer>
</body>

</html>
