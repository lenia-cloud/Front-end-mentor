<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Social links profile</title>


  <style>
    * {
      box-sizing: border-box;
    }

    @font-face {
      font-family: inter;
      src: url(assets/fonts/Inter-VariableFont_slnt\,wght.ttf);
    }

    body {
      background-color: hsl(0, 0%, 8%);
      text-align: center;
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: inter, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-weight: 500;
    }

    p {
      margin: 0;
    }

    footer {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: hsl(0, 0%, 60%);
      align-self: center;
      justify-content: center;
    }

    .card {
      width: min(360px, 100%);
      border-radius: 20px;
      background-color: hsl(0, 0%, 12%);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      padding: 2rem 1.5rem 2.5rem;
      margin:auto;
    }

    .pfp {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto;
      display: block;
      background-color: hsl(0, 0%, 16%);
    }

    .username {
      color: white;
      font-size: 1.75rem;
      margin: 1.5rem 0 0.45rem;
      font-weight: 700;
    }

    .location {
      color: hsl(75, 94%, 57%);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.04em;
    }

    .about {
      color: hsl(0, 0%, 75%);
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 1.75rem;
      padding: 0 0.25rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    button {
      width: 100%;
      color: white;
      background-color: hsl(0, 0%, 18%);
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      padding: 1rem 0;
      cursor: pointer;
      transition: background-color 0.2s ease;
      font-weight: 600;
    }

    button:hover {
      background-color: hsl(75, 94%, 57%);
      color:hsl(0, 0%, 18%);
    }

    .attribution a {
      color: hsl(228, 45%, 64%);
      text-decoration: none;
    }

    @media (max-width: 420px) {
      body {
        padding: 1rem;
      }

      .card {
        padding: 1.5rem 1rem 2rem;
      }

      .username {
        font-size: 1.5rem;
      }

      .about {
        font-size: 0.9rem;
      }

      .location {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="assets/images/avatar-jessica.jpeg" alt="" class="pfp">

    <p class="username">Jessica Randall</p>
    <p class="location">London, United Kingdom</p>
    <p class="about">"Front-end developer and avid reader."
    </p>

    <div class="buttons">
      <button class="github">GitHub</button>
      <button class="frontend-mentor">Frontend Mentor</button>
      <button class="linkedin">LinkedIn</button>
      <button class="twitter">Twitter</button>
      <button class="instagram">Instagram</button>

    </div>

  </div>









  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Bethel</a>
  </footer>
</body>

</html>
