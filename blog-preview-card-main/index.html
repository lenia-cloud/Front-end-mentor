<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>


  <style>
    @font-face {
      font-family: figtree;
      src: url(assets/fonts/Figtree-VariableFont_wght.ttf);
    }
    .attribution { font-size: 0.6875rem; text-align: center;  font-weight: bold;}
    .attribution a { color: hsl(228, 45%, 44%); }

    footer{
      margin-top:auto;
    }

    body{
      background-color:hsl(47, 88%, 63%);
      font-family: figtree, Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction:column;
      margin:0;
      min-height:100vh;
    }
    p{
      margin: 0;
    }

    .card{
      background-color: white;
      width: 300px;
      margin-top: 100px;
      border-radius: 15px;
      box-shadow: 5px 5px 0px black;
      border:1px solid black;

    }

    .illustration-container{
      width: 100%;
      height: auto;
      padding: 15px;
      box-sizing: border-box;
    }

    .illustration{
      width:100%;
      height:auto;
      display:block;
      border-radius:10px;
    }

    .yellowbox{
      font-weight: 800;
      font-size: 10px;
      padding:5px 8px;
      border-radius:3px;
      background-color: hsl(47, 88%, 63%);
      box-sizing: content-box;
      margin: 5px 15px;
      border:none;
      transition: all 0.2s ease-in-out;
    }

    .yellowbox:hover{
      cursor: pointer;
      box-shadow: 3px 1px 10px rgba(0, 0, 0, 0.311);
      filter: saturate(150%);
      margin-top: 2px;
      margin-bottom: 8px;
      
    }

    .date{
      font-size: 12px;
      color: hsl(0, 0%, 42%);
      margin-left: 15px;
      margin-top: 5px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .heading{
      font-size: 18px;
      font-weight: 800;
      color:hsl(0, 0%, 7%) ;
      margin:15px;
      transition: color 0.1s ease-out;
    }

    .heading:hover{
      cursor: pointer;
      
    }

    .heading:active{
      color: hsl(47, 88%, 63%);
      cursor:pointer;
    }

    .info{
      color: hsl(0, 0%, 42%);
      font-size:12px;
      margin:15px 15px 10px 15px;
      font-weight: 500;
      line-height: 18px;
    }

    .author-container{
      display: flex;
      justify-content: left;
      align-items: center;
      margin-bottom:10px;
    }

    .author-pfp{
      margin:10px 10px 10px 15px;
      width:25px;
    }

    .author-name{
      font-size: 11px;
      font-weight: 800;
      color: hsl(0, 0%, 7%);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="illustration-container">
      <img class="illustration" src="assets/images/illustration-article.svg" alt="This is an illustration.">
    </div>
    

    <button class="yellowbox">Learning</button>
    
    <p class="date">Published 21 Dec 2023</p>
    
    <p class="heading">HTML & CSS foundations</p>
    
    <p class="info">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    
    <div class="author-container">
      <img class="author-pfp" src="assets/images/image-avatar.webp" alt="This is an image of the author's pfp">
      <p class="author-name">Greg Hooper</p>
    </div>
    

  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Lenia</a>.
  </footer>
</body>
</html>
